# GitLab CI/CD Pipeline for MapVibe Monorepo
# This pipeline runs on every push to any branch

# Define pipeline stages
stages:
  - install
  - build
  - test
  - deploy

# Cache dependencies for faster builds
cache:
  key:
    files:
      - bun.lock
  paths:
    - node_modules/
    - .bun-cache/
    - apps/web/node_modules/
    - packages/*/node_modules/

# Default configuration for all jobs
default:
  image: oven/bun:latest
  before_script:
    - bun --version

# ===========================
# STAGE 1: INSTALL
# ===========================
install:
  stage: install
  script:
    - echo "📦 Installing dependencies for monorepo..."
    - bun install --frozen-lockfile
  artifacts:
    paths:
      - node_modules/
      - apps/*/node_modules/
      - packages/*/node_modules/
    expire_in: 1 hour
  only:
    - branches

# ===========================
# STAGE 2: BUILD
# ===========================

# Build ui-components package
build:ui-components:
  stage: build
  needs: [install]
  script:
    - echo "🎨 Building UI components..."
    - cd packages/ui-components
    - bun run build
  artifacts:
    paths:
      - packages/ui-components/dist/
    expire_in: 1 day
  only:
    - branches

# Build web app
build:web:
  stage: build
  needs: [install, build:ui-components]
  script:
    - echo "🌐 Building web application..."
    - cd apps/web
    - bun run build
  artifacts:
    paths:
      - apps/web/dist/
    expire_in: 1 week
  only:
    - branches
# ===========================
# STAGE 3: TEST (Optional)
# ===========================

# Uncomment when you have tests
# test:unit:
#   stage: test
#   needs: [build:ui-components]
#   script:
#     - echo "🧪 Running unit tests..."
#     - bun test
#   only:
#     - branches



# ===========================
# STAGE 5: DEPLOY
# ===========================

# Deploy Frontend to S3 + CloudFront
deploy:frontend:
  stage: deploy
  image: amazon/aws-cli:latest
  needs: [build:web]
  script:
    - echo "🚀 Deploying frontend to S3..."
    - aws s3 sync apps/web/dist s3://$S3_BUCKET_NAME --delete
    - echo "🔄 Invalidating CloudFront cache..."
    - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DIST_ID --paths "/*"
    - echo "✅ Frontend deployed successfully"
  rules:
    # Trigger on MR to dev when frontend changed
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev"
      changes:
        - apps/web/**/*
        - packages/ui-components/**/*
      when: manual
    # Trigger on dev branch when frontend changed
    - if: $CI_COMMIT_BRANCH == "dev"
      changes:
        - apps/web/**/*
        - packages/ui-components/**/*
      when: manual
  allow_failure: false

# Deploy Lambda API (requires Terraform)
deploy:lambda-api:
  stage: deploy
  image: hashicorp/terraform:latest
  needs: []
  script:
    - echo "🚀 Deploying Lambda API..."
    - cd infrastructure/terraform
    - terraform init
    - terraform apply -target=module.lambda_api -auto-approve
    - echo "✅ Lambda API deployed successfully"
  rules:
    # Trigger on MR to dev when API changed
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev"
      changes:
        - apps/api/**/*
        - infrastructure/terraform/modules/lambda-api/**/*
      when: manual
    # Trigger on dev branch when API changed
    - if: $CI_COMMIT_BRANCH == "dev"
      changes:
        - apps/api/**/*
        - infrastructure/terraform/modules/lambda-api/**/*
      when: manual
  allow_failure: false

# Deploy Infrastructure + Run Migrations (Terraform)
deploy:infrastructure:
  stage: deploy
  image: hashicorp/terraform:latest
  needs: []
  before_script:
    - apk add --no-cache aws-cli
  script:
    - echo "🏗️ Deploying infrastructure..."
    - cd infrastructure/terraform
    - terraform init
    - terraform plan
    - terraform apply -auto-approve
    - echo "✅ Infrastructure deployed"
    - echo ""
    - echo "🗄️ Running database migrations..."
    - aws lambda invoke --function-name mapvibe-db-migration-mvp --payload '{}' --cli-binary-format raw-in-base64-out response.json
    - cat response.json
    - echo ""
    - echo "✅ Migrations completed"
  rules:
    # Trigger on MR to dev when terraform or migrations changed
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev"
      changes:
        - infrastructure/terraform/**/*
      when: manual
    # Trigger on dev branch when terraform or migrations changed
    - if: $CI_COMMIT_BRANCH == "dev"
      changes:
        - infrastructure/terraform/**/*
      when: manual
  allow_failure: false
